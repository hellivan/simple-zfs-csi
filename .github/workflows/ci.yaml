name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l api cmd internal)
          if [ -n "$out" ]; then echo "unformatted files:"; echo "$out"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: generated manifests up to date
        run: |
          make manifests
          if ! git diff --quiet; then
            echo "Generated CRD/deepcopy are out of date. Run 'make manifests' and commit the result:"
            git --no-pager diff --stat
            exit 1
          fi
      - name: go test
        run: go test ./...

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: helm lint charts/simple-zfs-csi
      - name: helm template
        run: helm template rel charts/simple-zfs-csi --namespace simple-zfs-csi > /dev/null

  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { image: nfs,        dockerfile: build/nfs.Dockerfile }
          - { image: nvmeof,     dockerfile: build/nvmeof.Dockerfile }
          - { image: discovery,  dockerfile: build/discovery.Dockerfile }
          - { image: operator,   dockerfile: build/operator.Dockerfile }
          - { image: controller, dockerfile: build/csi-controller.Dockerfile }
          - { image: node,       dockerfile: build/csi-node.Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build simple-zfs-csi-${{ matrix.image }} image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
