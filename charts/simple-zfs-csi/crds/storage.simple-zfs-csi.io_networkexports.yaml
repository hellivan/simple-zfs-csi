---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: networkexports.storage.simple-zfs-csi.io
spec:
  group: storage.simple-zfs-csi.io
  names:
    kind: NetworkExport
    listKind: NetworkExportList
    plural: networkexports
    shortNames:
    - nexport
    singular: networkexport
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.nodeName
      name: Node
      type: string
    - jsonPath: .spec.protocol
      name: Protocol
      type: string
    - jsonPath: .spec.path
      name: Path
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          NetworkExport is the Schema for the networkexports API. It is a generic,
          storage-agnostic "intent to export" a node-local path over the network from a
          specific node. It is the only resource the node-local NFS / NVMe-oF
          aggregators execute; ZFS-centric intent (ZfsShare) compiles down into it.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              NetworkExportSpec describes the desired network export of an already-existing
              node-local path: a filesystem mountpoint (NFS) or a block device (NVMe-oF).
              It is storage-agnostic — it carries no ZFS or sizing parameters. Higher-level
              controllers (e.g. the ZfsShare reconciler) compile their intent down into a
              NetworkExport, which is the only contract the node-local aggregators execute.
            properties:
              nfs:
                description: NFS holds NFS-specific export configuration. Required
                  when protocol is nfs.
                properties:
                  clients:
                    description: |-
                      Clients is the set of client match specs allowed to mount the export.
                      Each entry maps to one line fragment in /etc/exports.
                    items:
                      description: NFSClient is a single NFS export client rule.
                      properties:
                        client:
                          description: 'Client is the host match: "*", a CIDR (10.0.0.0/24),
                            an IP, or a hostname.'
                          minLength: 1
                          type: string
                        options:
                          description: |-
                            Options are raw NFS export options for this client, e.g.
                            ["rw", "no_root_squash", "no_subtree_check", "sync"].
                            When empty a safe default set is applied by the controller.
                          items:
                            type: string
                          type: array
                      required:
                      - client
                      type: object
                    minItems: 1
                    type: array
                required:
                - clients
                type: object
              nodeName:
                description: |-
                  NodeName pins the export to the physical storage node that holds the
                  underlying path. Only the controller running on this node acts on it.
                minLength: 1
                type: string
              nvmeof:
                description: NVMeoF holds NVMe-oF specific configuration. Required
                  when protocol is nvmeof.
                properties:
                  allowedHosts:
                    description: |-
                      AllowedHosts is the list of host NQNs permitted to connect. When empty the
                      subsystem allows any host (allow_any_host=1).
                    items:
                      type: string
                    type: array
                  dhchapSecretKey:
                    description: |-
                      DHChapSecretKey is the data key within DHChapSecretName that holds the
                      DH-CHAP secret (DHHC-1 format). The operator always sets it alongside
                      DHChapSecretName (defaulting to "dhchap-key"); readers must use this value
                      rather than assuming a fixed key.
                    type: string
                  dhchapSecretName:
                    description: |-
                      DHChapSecretName references a Secret holding the per-attach DH-CHAP key
                      that the target programs onto the allowed host and the node passes to
                      `nvme connect --dhchap-secret`. Empty means no in-band authentication. See
                      design-decisions ADR-0011.
                    type: string
                  dhchapSecretNamespace:
                    description: |-
                      DHChapSecretNamespace is the namespace of DHChapSecretName (the driver's
                      release namespace). Required when DHChapSecretName is set.
                    type: string
                  nqn:
                    description: |-
                      NQN is the subsystem NQN clients use to connect. When empty the controller
                      derives a deterministic NQN from the resource metadata.
                    type: string
                type: object
              path:
                description: |-
                  Path is the local, node-side source of the export.
                  For nfs: the mountpoint to export, e.g. "/tank/k8s/pvc-123".
                  For nvmeof: the block device, e.g. "/dev/zvol/tank/pvc-123".
                minLength: 1
                type: string
              protocol:
                description: Protocol selects the sharing backend.
                enum:
                - nfs
                - nvmeof
                type: string
            required:
            - nodeName
            - path
            - protocol
            type: object
            x-kubernetes-validations:
            - message: spec.nfs is required when protocol is nfs
              rule: self.protocol != 'nfs' || has(self.nfs)
            - message: spec.nvmeof is required when protocol is nvmeof
              rule: self.protocol != 'nvmeof' || has(self.nvmeof)
          status:
            description: NetworkExportStatus reports the observed export state on
              the node.
            properties:
              conditions:
                description: Conditions represents the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              message:
                description: Message carries human-readable detail about the current
                  phase.
                type: string
              nqn:
                description: NQN is the effective subsystem NQN for nvmeof exports.
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec generation last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is a coarse summary of the current state.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
