# Default values for the simple-zfs-csi chart.

# -- Override the chart name used in resource names.
nameOverride: ""
# -- Override the full release name used in resource names.
fullnameOverride: ""

# -- CSI driver name. Must match the CSIDriver object and the StorageClass
# `provisioner` field.
driverName: simple-zfs-csi.io

# -- Log level for all components. Set to `debug` to log every host command the
# agents run (zfs/zpool/mount/nvme), including the fully resolved chroot/nsenter
# invocation, to hunt down provisioning failures. Empty keeps the component
# default (info). Maps to `--zap-log-level`. Any component can override this with
# its own `<component>.logLevel` (e.g. `discovery.logLevel: debug`).
logLevel: ""

image:
  # -- Container registry hosting the controller images.
  registry: ghcr.io
  # -- Image repository prefix; the `-nfs` / `-nvmeof` suffix is appended.
  repository: hellivan/simple-zfs-csi
  # -- Image tag. Defaults to the chart appVersion when empty.
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries.
imagePullSecrets: []

# -- Node selector applied to both DaemonSets. Storage nodes should carry this label.
nodeSelector:
  simple-zfs-csi.io/storage: "true"
# -- Tolerations applied to both DaemonSets.
tolerations:
  - operator: Exists

# -- Default PriorityClass for the NFS/NVMe-oF target DaemonSets and the CSI
# -- node plugin DaemonSet. These are the pods most likely to be co-located with
# -- the workloads that depend on them (see docs/known-pitfalls.md class 16), so
# -- `system-node-critical` reduces the odds the kubelet evicts/starves the
# -- server or node plugin ahead of the ordinary pods that need them during node
# -- pressure. Override per component via `<component>.priorityClassName`, or set
# -- this to "" to fall back to no PriorityClass. The named class must already
# -- exist in the cluster (`system-node-critical` is built in).
priorityClassName: system-node-critical

serviceAccount:
  # -- Create the ServiceAccounts (one per controller).
  create: true
  # -- Extra annotations for the ServiceAccounts.
  annotations: {}

rbac:
  # -- Create the ClusterRole and ClusterRoleBindings.
  create: true

# -------- NFS controller --------
nfs:
  # -- Deploy the NFS target DaemonSet.
  enabled: true
  image:
    # -- Override the full NFS image (registry/repo:tag). Empty derives it from `image.*`.
    repository: ""
    tag: ""
  # -- Number of nfsd kernel threads.
  threads: 8
  # -- Serve NFSv4 only (disables v2/v3 and rpcbind; single port 2049).
  v4Only: false
  # -- Path of the exports file inside the container.
  exportsPath: /etc/exports
  pool:
    # -- Host path of the ZFS pool root that holds exported datasets.
    hostPath: /tank
    # -- Mount path of the pool inside the container (must match dataset paths).
    mountPath: /tank
  # -- Log level override for this component (falls back to the global `logLevel`).
  logLevel: ""
  # -- Extra CLI args for the nfs-controller.
  extraArgs: []
  # -- Resource requests/limits.
  resources: {}
  # -- Pod annotations.
  podAnnotations: {}
  # -- PriorityClass override for this DaemonSet. Empty falls back to the
  # -- top-level `priorityClassName`.
  priorityClassName: ""
  # -- Host ports for metrics and health probes. With hostNetwork these bind on
  # the node, so they must not clash with the nvmeof controller on the same node.
  ports:
    metrics: 8080
    health: 8081

# -------- NVMe-oF controller --------
nvmeof:
  # -- Deploy the NVMe-oF target DaemonSet.
  enabled: true
  image:
    # -- Override the full NVMe-oF image (registry/repo:tag). Empty derives it from `image.*`.
    repository: ""
    tag: ""
  # -- Prefix for deterministically derived subsystem NQNs.
  nqnPrefix: nqn.2025-01.io.simple-zfs-csi
  # NVMe-oF access control (ADR-0011). Exports are always default-deny by the
  # attached node's per-attach host NQN; DH-CHAP adds in-band password auth.
  auth:
    dhchap:
      # -- Enable NVMe-oF DH-CHAP in-band authentication. NQN allow-listing
      # -- applies regardless; turning this off keeps identity restriction but
      # -- drops the password.
      enabled: true
      # -- Data key under which the operator stores the DH-CHAP secret in each
      # -- per-attach Secret (recorded on the NetworkExport for readers).
      secretKeyName: dhchap-key
  # -- Host mount point of the configfs filesystem. The nvmet target subtree
  # lives at `<configfsRoot>/nvmet`, which is what the controller manages.
  configfsRoot: /sys/kernel/config
  transport:
    # -- NVMe/TCP listen address on the node.
    address: 0.0.0.0
    # -- NVMe/TCP listen port.
    serviceId: "4420"
    # -- nvmet port directory id.
    portId: "1"
  # -- Log level override for this component (falls back to the global `logLevel`).
  logLevel: ""
  # -- Extra CLI args for the nvmeof-controller.
  extraArgs: []
  # -- Resource requests/limits.
  resources: {}
  # -- Pod annotations.
  podAnnotations: {}
  # -- PriorityClass override for this DaemonSet. Empty falls back to the
  # -- top-level `priorityClassName`.
  priorityClassName: ""
  # -- Host ports for metrics and health probes. With hostNetwork these bind on
  # the node, so they must differ from the nfs controller on the same node.
  ports:
    metrics: 8082
    health: 8083

# -------- ZfsPool discovery (Tier 1: per-node DaemonSet) --------
discovery:
  # -- Deploy the per-node zpool discovery DaemonSet that publishes ZfsPool CRDs.
  enabled: true
  image:
    # -- Override the full discovery image (registry/repo:tag). Empty derives it from `image.*`.
    repository: ""
    tag: ""
  # -- How often each node re-discovers its local pools.
  pollInterval: 30s
  # -- Path to the zpool binary (resolved on the host PATH when hostExec is on).
  zpoolBin: zpool
  # -- Path to the zfs binary (resolved on the host PATH when hostExec is on).
  zfsBin: zfs
  # Run the host's own version-matched zpool/zfs. The discovery image ships NO
  # ZFS tools of its own, so this must stay enabled unless you supply a custom
  # image that provides zpool/zfs. Running the host binaries also guarantees the
  # CLI never drifts from the host ZFS kernel module. Recommended on Talos (the
  # siderolabs/zfs extension ships the utilities on the host).
  hostExec:
    # -- Enable running the host's zpool/zfs. Disable only with a custom image
    # that bundles matching ZFS userspace tools.
    enabled: true
    # -- How to reach the host binaries: "nsenter" (default; enters the host
    # mount namespace of targetPid, requires hostPID) or "chroot" (bind-mounts
    # the host root at /host).
    #
    # WARNING: use "nsenter". "chroot" does NOT work correctly on Talos for this
    # agent. discovery runs `zfs create`/`clone`, which AUTO-MOUNT the new
    # dataset. chroot changes path resolution, not the mount namespace, so that
    # mount is born inside the pod under /host and can only reach the host if the
    # /host volume is Bidirectional AND host `/` is a SHARED mount. On Talos the
    # kubelet only shares paths listed in machine.kubelet.extraMounts, and `/` is
    # not (and cannot practically) be among them — so the created mount is
    # trapped in the pod and lost on restart. Observed effect: every NFS PVC
    # dataset ends up UNMOUNTED on the host and reads/writes land in the PARENT
    # dataset. nsenter creates the mount directly in the host namespace under the
    # already-shared pool path, so it propagates to the NFS pod and consumers.
    # See docs/known-pitfalls.md class 15 and docs/design-decisions.md ADR-0016.
    mode: nsenter
    # -- Host PID whose namespaces are entered in nsenter mode.
    targetPid: 1
    # -- Host root path bind-mounted to /host in chroot mode.
    hostRootPath: /
  # -- Log level override for this component (falls back to the global `logLevel`).
  logLevel: ""
  # -- Extra CLI args for the zpool-discovery binary.
  extraArgs: []
  # -- Resource requests/limits.
  resources: {}
  # -- Pod annotations.
  podAnnotations: {}
  # -- Container ports for metrics and health probes. The discovery pod does not
  # use hostNetwork, so these are pod-local and need not avoid other components.
  ports:
    metrics: 8084
    health: 8085

# -------- Operator (cluster-wide control-plane Deployment) --------
operator:
  # -- Deploy the cluster-wide operator: node-death watcher (offlines dead nodes'
  # -- ZfsPools) plus the cluster-scoped reconcilers it hosts.
  enabled: true
  # -- Number of replicas (leader election ensures only one acts at a time).
  replicas: 1
  image:
    # -- Override the full operator image (registry/repo:tag). Empty derives it from `image.*`.
    repository: ""
    tag: ""
  # -- Enable leader election across operator replicas.
  leaderElect: true
  # -- Log level override for this component (falls back to the global `logLevel`).
  logLevel: ""
  # -- Extra CLI args for the operator binary.
  extraArgs: []
  # -- Resource requests/limits.
  resources: {}
  # -- Pod annotations.
  podAnnotations: {}
  # -- Node selector for the operator pod (runs anywhere; not a storage node).
  nodeSelector: {}
  # -- Tolerations for the operator pod.
  tolerations: []
  ports:
    metrics: 8086
    health: 8087

# -------- CSI controller (cluster-wide provisioning adapter) --------
csiController:
  # -- Deploy the CSI controller Deployment (plugin + external-provisioner sidecar).
  enabled: true
  # -- Number of replicas (external-provisioner leader-elects a single active).
  replicas: 1
  image:
    # -- Override the full CSI controller image (registry/repo:tag). Empty derives it from `image.*`.
    repository: ""
    tag: ""
  # -- Directory shared (emptyDir) between the plugin and the provisioner sidecar
  # -- for the CSI unix socket.
  socketDir: /csi
  # -- How long CreateVolume waits for the ZfsDataset to become Ready.
  createTimeout: 2m
  # -- How often CreateVolume re-reads the ZfsDataset while waiting.
  pollInterval: 2s
  # -- PVC annotation prefix whose keys override parameters (empty disables the
  # -- PVC inheritance layer).
  pvcAnnotationPrefix: param.simple-zfs-csi.io/
  # -- Provisioner default parameters (lowest-precedence inheritance layer).
  # -- When non-empty they are rendered into a ConfigMap that the controller reads
  # -- live from the API on each CreateVolume (no file mount; edits take effect
  # -- without a restart). NOTE:
  # -- `poolGUID` and `datasetPrefix` are StorageClass-only and are ignored here
  # -- (see docs/design-decisions.md ADR-0002); use them for cluster-wide
  # -- defaults such as protocol or ZFS properties instead.
  defaultParameters: {}
    # protocol: nfs
    # property.compression: lz4
    # -- Root ownership/permissions applied once to a filesystem (nfs) dataset
    # -- right after creation via chown/chmod on the host. These are the NFS
    # -- (RWX) analogue of pod `securityContext.fsGroup`, which kubelet does not
    # -- apply to shared volumes. They are silently ignored for nvmeof (block)
    # -- volumes, so setting them cluster-wide here is safe. Unset leaves the ZFS
    # -- default (root:root, 0755). All three are overridable per-PVC via the
    # -- `param.simple-zfs-csi.io/{uid,gid,mode}` annotations.
    # uid: "1000"          # numeric POSIX uid
    # gid: "1000"          # numeric POSIX gid
    # mode: "0770"         # octal permission string
  # external-provisioner sidecar.
  provisioner:
    # -- external-provisioner image repository.
    image: registry.k8s.io/sig-storage/csi-provisioner
    # -- external-provisioner image tag.
    tag: v5.1.0
    # -- Default filesystem type recorded on every provisioned filesystem PV
    # -- (pv.spec.csi.fsType) when the StorageClass does not set
    # -- `csi.storage.k8s.io/fstype`. Populating it lets kubelet apply pod
    # -- `securityContext.fsGroup` ownership to single-node NVMe-oF volumes (see
    # -- `csiDriver.fsGroupPolicy`); it is harmless for NFS (RWX) volumes, which
    # -- are never in scope for the fsGroup policy. Empty disables the default.
    defaultFsType: ext4
    # -- Extra args for external-provisioner.
    extraArgs: []
    # -- Resource requests/limits for the sidecar.
    resources: {}
  # external-resizer sidecar (volume expansion). Set StorageClass
  # `allowVolumeExpansion: true` to let PVCs grow.
  resizer:
    # -- Deploy the external-resizer sidecar (enables volume expansion).
    enabled: true
    # -- external-resizer image repository.
    image: registry.k8s.io/sig-storage/csi-resizer
    # -- external-resizer image tag.
    tag: v1.13.1
    # -- Extra args for external-resizer.
    extraArgs: []
    # -- Resource requests/limits for the sidecar.
    resources: {}
  # external-snapshotter sidecar (volume snapshots). Requires the snapshot CRDs
  # and the snapshot-controller to be installed cluster-wide (a prerequisite,
  # not shipped by this chart). Create a VolumeSnapshotClass via
  # `volumeSnapshotClasses` below.
  snapshotter:
    # -- Deploy the csi-snapshotter sidecar (enables volume snapshots).
    enabled: true
    # -- csi-snapshotter image repository.
    image: registry.k8s.io/sig-storage/csi-snapshotter
    # -- csi-snapshotter image tag.
    tag: v8.2.0
    # -- Extra args for csi-snapshotter.
    extraArgs: []
    # -- Resource requests/limits for the sidecar.
    resources: {}
  # external-attacher sidecar (attach-stage access control). Mandatory: the share
  # lifecycle lives at the attach stage (ADR-0010), so a volume is exported only
  # to nodes that hold an attach request. It is always deployed (like the
  # provisioner) — only its image/args/resources are configurable.
  attacher:
    # -- external-attacher image repository.
    image: registry.k8s.io/sig-storage/csi-attacher
    # -- external-attacher image tag.
    tag: v4.8.1
    # -- Extra args for external-attacher.
    extraArgs: []
    # -- Resource requests/limits for the sidecar.
    resources: {}
  # -- Log level override for this component (falls back to the global `logLevel`).
  logLevel: ""
  # -- Extra CLI args for the csi-controller binary.
  extraArgs: []
  # -- Resource requests/limits for the plugin container.
  resources: {}
  # -- Pod annotations.
  podAnnotations: {}
  # -- Node selector for the controller pod (runs anywhere; not a storage node).
  nodeSelector: {}
  # -- Tolerations for the controller pod.
  tolerations: []

# -------- CSI node plugin (per-node mount/attach DaemonSet) --------
csiNode:
  # -- Deploy the CSI node plugin DaemonSet (plugin + node-driver-registrar sidecar).
  enabled: true
  image:
    # -- Override the full CSI node image (registry/repo:tag). Empty derives it from `image.*`.
    repository: ""
    tag: ""
  # -- Kubelet root directory. The plugin, registration and pod mount dirs live
  # -- beneath it; override for k0s/microk8s/RKE non-standard layouts.
  kubeletDir: /var/lib/kubelet
  # -- NVMe-oF transport used to connect to the storage node.
  nvmeTransport: tcp
  # -- Optional override for the NVMe-oF service port the node connects to. Empty
  # -- (recommended) derives it from `nvmeof.transport.serviceId`, so the target
  # -- and initiator ports cannot drift. Set only to target a different port
  # -- (e.g. a load balancer in front of the storage nodes).
  nvmePort: ""
  # Bound how NodeUnpublishVolume's unmount behaves against a hard NFS/NVMe-oF
  # mount whose server has vanished (e.g. node reboot with the server and its
  # own client co-located). See docs/known-pitfalls.md class 16.
  unmount:
    # -- How long a single unmount waits for a plain `umount` to return before
    # -- giving up (or falling back, see forceLazyFallback below) instead of
    # -- blocking forever. 90s matches systemd's own default service-stop
    # -- timeout (`DefaultTimeoutStopSec`).
    timeout: 90s
    # -- After a plain umount fails or times out, force a lazy unmount
    # -- (`umount -f -l` / MNT_DETACH) so NodeUnpublishVolume can no longer be
    # -- blocked indefinitely by a dead NFS/NVMe-oF server. Opt-in (disabled by
    # -- default): MNT_DETACH detaches the mount point before outstanding I/O to
    # -- the target has necessarily finished draining, which is a real (if
    # -- narrow) data-safety tradeoff you should opt into deliberately. With
    # -- this left false, unmount still never blocks forever — it just returns
    # -- an error to the caller (which kubelet retries) instead of forcing the
    # -- detach.
    forceLazyFallback: false
  # -- terminationGracePeriodSeconds for the csi-node pod. Empty (default)
  # -- leaves Kubernetes' own 30s pod default in place UNLESS
  # -- `unmount.forceLazyFallback` is enabled, in which case the chart
  # -- defaults this to 120s automatically — comfortably above
  # -- `unmount.timeout`'s 90s default, so kubelet's SIGKILL doesn't cut off
  # -- the lazy-fallback unmount before it can actually complete. With
  # -- `forceLazyFallback` disabled, extending this buys little: `Unmount`
  # -- never blocks forever either way, and whether it fails via kubelet's
  # -- SIGKILL (connection reset) at 30s or via its own bounded timeout at
  # -- 90s, the outcome is the same failed unmount — only `forceLazyFallback`
  # -- turns "more time" into "an unmount that actually succeeds". Set this
  # -- explicitly to override either default. If you raise `unmount.timeout`
  # -- with `forceLazyFallback` enabled, raise this to match. See
  # -- docs/known-pitfalls.md class 16.
  terminationGracePeriodSeconds: ""
  # Run mount.nfs / nvme against the host's binaries instead of the in-image
  # tools. The node image bundles nfs-common + nvme-cli, so this is off by
  # default; enable on hosts (e.g. Talos) where mounts must run in the host
  # context.
  hostExec:
    # -- Enable running the host's mount/nvme binaries via chroot/nsenter.
    enabled: false
    # -- "nsenter" (default; enter targetPid namespaces) or "chroot" (bind-mount
    # host root at /host).
    #
    # WARNING: use "nsenter". When host-exec is enabled the node mounter runs
    # `mount`/`mkfs`, which CREATE mounts. Under chroot those mounts are born in
    # the pod under /host and only reach the kubelet if /host is Bidirectional
    # and host `/` is SHARED — which does not hold on Talos (see the discovery
    # note above, known-pitfalls.md class 15, design-decisions.md ADR-0016). A
    # consumer volume then comes up EMPTY. nsenter creates the mount on the host
    # directly and needs no /host volume or shared-root.
    mode: nsenter
    # -- Host PID whose namespaces are entered in nsenter mode.
    targetPid: 1
    # -- Host root path bind-mounted to /host in chroot mode.
    hostRootPath: /
  # node-driver-registrar sidecar.
  registrar:
    # -- node-driver-registrar image repository.
    image: registry.k8s.io/sig-storage/csi-node-driver-registrar
    # -- node-driver-registrar image tag.
    tag: v2.13.0
    # -- Resource requests/limits for the sidecar.
    resources: {}
  # -- Log level override for this component (falls back to the global `logLevel`).
  logLevel: ""
  # -- Extra CLI args for the csi-node binary.
  extraArgs: []
  # -- Resource requests/limits for the plugin container.
  resources: {}
  # -- Pod annotations.
  podAnnotations: {}
  # -- PriorityClass override for this DaemonSet. Empty falls back to the
  # -- top-level `priorityClassName`.
  priorityClassName: ""
  # -- Node selector limiting which nodes run the plugin (empty = all nodes).
  nodeSelector: {}
  # -- Tolerations; defaults to tolerating everything so the plugin runs on every node.
  tolerations:
    - operator: Exists

# -------- CSIDriver object --------
csiDriver:
  # -- Install the CSIDriver object for the driver.
  create: true
  # -- fsGroup ownership policy. "ReadWriteOnceWithFSType" (the CSI default)
  # -- makes kubelet apply pod `securityContext.fsGroup` only to single-node
  # -- (RWO) volumes that record a filesystem type — the NVMe-oF zvol volumes,
  # -- once `csiController.provisioner.defaultFsType` populates their PV fsType —
  # -- while leaving shared NFS (RWX) exports untouched. Other values: "File"
  # -- (apply to every volume, including NFS) or "None" (never apply fsGroup).
  fsGroupPolicy: ReadWriteOnceWithFSType

# -------- Pool maintenance --------
# ZFS pools need periodic scrubbing. When enabled, the operator reconciles one
# CronJob per listed pool, pinned to the pool's current node (following takeover)
# and suspended while the pool is offline. Each run is a Kubernetes Job that
# succeeds on a clean scrub and fails on errors — monitor via kube-state-metrics
# (`kube_job_status_failed`). See docs/design-decisions.md ADR-0012.
maintenance:
  scrub:
    # -- Enable operator-reconciled scrub CronJobs (requires the operator).
    enabled: false
    # -- Default cron schedule for pools that don't set their own.
    defaultSchedule: "0 3 * * 0"
    # -- Max time a single scrub Job may run before being killed.
    activeDeadlineSeconds: 86400
    # -- Timeout passed to the scrub binary (should be <= activeDeadlineSeconds).
    timeout: 24h
    # -- Retained finished/failed Job history per pool CronJob.
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    # -- Resource requests/limits for the scrub container.
    resources: {}
    # -- Pools to scrub, by GUID, with an optional per-pool schedule override.
    pools: []
      # - guid: "1234567890"
      #   schedule: "0 3 * * 6"

# -------- Maintenance toolbox --------
# An interactive pod for running ad-hoc ZFS maintenance commands against a
# storage node's pools (analogous to the Rook Ceph toolbox). Unlike Ceph client
# tools, `zpool`/`zfs` are NOT network clients: they act on the host kernel
# module of the node that imported the pool. The toolbox therefore reuses the
# discovery image (which ships no ZFS tools of its own) and execs the HOST's
# `zpool`/`zfs`/`zdb` via the same host-exec seam as discovery, exposing them on
# PATH so `kubectl exec ... -- zpool status` works. Disabled by default.
toolbox:
  # -- Deploy the maintenance toolbox.
  enabled: false
  # -- Workload kind. "DaemonSet" (default) runs one toolbox on every storage
  # -- node, so each node's local pools are reachable via the pod on that node —
  # -- recommended when pools live on multiple nodes (ZFS is node-local). On a
  # -- single storage node this is just one pod. "Deployment" runs a single pod
  # -- (Rook-style) that you pin with `nodeName`.
  kind: DaemonSet
  image:
    # -- Override the full toolbox image (registry/repo:tag). Empty reuses the
    # -- discovery image.
    repository: ""
    tag: ""
  # -- Pin the single toolbox pod to a specific node (Deployment kind only). ZFS
  # -- is node-local, so target the node that imported the pool you want to
  # -- service: `kubectl get zfspool <guid> -o jsonpath='{.status.currentNode}'`.
  # -- Ignored when kind is DaemonSet (which already runs on every storage node).
  nodeName: ""
  # Run the host's zpool/zfs/zdb, exposed inside the pod as plain commands. Keep
  # enabled unless you supply a custom image bundling matching ZFS userspace
  # tools (mirrors discovery.hostExec).
  hostExec:
    # -- Enable running the host's ZFS tools via chroot/nsenter.
    enabled: true
    # -- "nsenter" (default; enter targetPid namespaces) or "chroot" (bind-mount
    # host root at /host).
    #
    # WARNING: prefer "nsenter" — "chroot" cannot create host mounts on Talos
    # (see discovery.hostExec.mode, known-pitfalls.md class 15, ADR-0016), so a
    # `zfs mount`/`zfs create` run from a chroot toolbox will NOT affect the
    # host. Trade-off: nsenter drops the `/host` browse volume (it exists only in
    # chroot mode). To browse dataset mountpoints under nsenter, set
    # `toolbox.datasetMountRoot` (below) or use `nsenter -t 1 -m -- ls ...`.
    mode: nsenter
    # -- Host PID whose namespaces are entered in nsenter mode.
    targetPid: 1
    # -- Host root path bind-mounted to /host in chroot mode. On Talos the
    # -- kubelet runs in its own sandboxed mount namespace and does not see
    # -- arbitrary host paths (incl. "/") without a matching
    # -- machine.kubelet.extraMounts entry for this exact path — impractical
    # -- to do for the whole root. Prefer hostExec.mode: nsenter on Talos: with
    # -- hostPID it enters the host's mount namespace directly via
    # -- /proc/1/ns/mnt, so it needs no hostPath volume and no Talos
    # -- extraMounts at all.
    hostRootPath: /
  # -- Optional host directory bind-mounted into the toolbox at the SAME path
  # -- (unlike hostExec's /host chroot), with HostToContainer propagation, so
  # -- dataset mountpoints are directly browsable (`ls`, `du`, `rsync`, ...)
  # -- without the /host prefix. Becomes the hostPath `path` of the volume.
  # --
  # -- This does NOT need to equal your pool's exact mountpoint — it may be a
  # -- PARENT of it (e.g. "/var/mnt" when the pool is at
  # -- "/var/mnt/spinning-archive"). A parent is the recommended,
  # -- node-independent choice: the same chart value works on every storage
  # -- node even though each node's pools/mountpoints differ, and newly
  # -- provisioned PVCs under it appear without restarting the toolbox.
  # --
  # -- On plain systemd-managed hosts, visibility is automatic (kubelet runs in
  # -- the host mount namespace) — this value just needs to already be a
  # -- "shared" mount (verify: `findmnt -o TARGET,PROPAGATION <path>`; if
  # -- "private", `mount --make-rshared <path>`, persisted via a systemd mount
  # -- unit).
  # --
  # -- On Talos the kubelet runs in its OWN isolated mount namespace and only
  # -- sees host paths added via `machine.kubelet.extraMounts`. You do NOT have
  # -- to widen extraMounts to match a parent datasetMountRoot: keep the
  # -- specific per-pool entry in MachineConfig and set datasetMountRoot to the
  # -- parent. It still works because Talos creates the parent dir ("/var/mnt")
  # -- in the kubelet namespace to host the "/var/mnt/spinning-archive" bind
  # -- mount, so a hostPath at the parent recursively (rbind) picks that
  # -- submount up, and its rshared→rslave propagation carries datasets
  # -- provisioned later into the pod. The rest of the parent shows up empty in
  # -- the pod (harmless). Typical split:
  # --   # MachineConfig (per node): specific mountpoint
  # --   machine:
  # --     kubelet:
  # --       extraMounts:
  # --         - destination: /var/mnt/spinning-archive
  # --           type: bind
  # --           source: /var/mnt/spinning-archive
  # --           options: [rbind, rshared, rw]   # rshared drives propagation
  # --   # this chart (all nodes): generic parent
  # --   toolbox: { datasetMountRoot: /var/mnt }
  # -- (If a node has NO extraMounts entry under datasetMountRoot, its toolbox
  # -- pod just sees an empty dir.) After changing extraMounts, apply with
  # -- `talosctl apply-config` (expect the kubelet to restart).
  # -- Leave empty to disable (default).
  datasetMountRoot: ""
  # -- Resource requests/limits.
  resources: {}
  # -- Pod annotations.
  podAnnotations: {}

# -------- Example StorageClasses --------
# -- StorageClasses to install with the chart. A list; each entry is created
# -- with its `name` used verbatim as the StorageClass name (NOT prefixed with
# -- the release name), so `name` is exactly what PVCs reference. By default none
# -- are installed. `poolGUID` and `datasetPrefix` are StorageClass-only
# -- parameters and must be set here (they are never inherited from
# -- defaultParameters or PVC annotations). `poolGUID` is required per
# -- StorageClass.
storageClasses: []
  # - name: nfs
  #   isDefault: false
  #   reclaimPolicy: Delete
  #   volumeBindingMode: Immediate
  #   allowVolumeExpansion: false
  #   parameters:
  #     poolGUID: "1234567890"   # required; identifies the target ZFS pool
  #     datasetPrefix: k8s        # optional; prefixes every provisioned dataset
  #     protocol: nfs
  #     # Optional root ownership/permissions applied once at creation. Overridable
  #     # per-PVC via the param.simple-zfs-csi.io/{uid,gid,mode} annotations.
  #     uid: "1000"
  #     gid: "1000"
  #     mode: "0770"
  # - name: nvmeof
  #   reclaimPolicy: Delete
  #   parameters:
  #     poolGUID: "1234567890"
  #     datasetPrefix: k8s/block
  #     protocol: nvmeof
  #     volblocksize: 16k

# -------- Example VolumeSnapshotClasses --------
