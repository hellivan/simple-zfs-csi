{{- if .Values.csiDriver.create }}
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: {{ .Values.driverName }}
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
spec:
  # Attach is used purely as the zero-trust authorization hook (ADR-0010): the
  # controller creates the network export only for authorized nodes at
  # ControllerPublishVolume. Set false to disable attach-stage access control.
  attachRequired: {{ .Values.csiDriver.attachRequired }}
  # The node plugin reads the volume_context at publish time.
  podInfoOnMount: false
  volumeLifecycleModes:
    - Persistent
{{- end }}
