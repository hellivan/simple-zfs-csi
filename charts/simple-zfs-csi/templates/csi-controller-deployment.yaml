{{- if .Values.csiController.enabled }}
{{- if .Values.csiController.defaultParameters }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-csi-controller-defaults
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-controller
data:
  parameters.yaml: |
    {{- toYaml .Values.csiController.defaultParameters | nindent 4 }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-csi-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-controller
spec:
  replicas: {{ .Values.csiController.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "simple-zfs-csi.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: csi-controller
  template:
    metadata:
      labels:
        {{- include "simple-zfs-csi.labels" . | nindent 8 }}
        app.kubernetes.io/component: csi-controller
      {{- with .Values.csiController.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "simple-zfs-csi.serviceAccountName" (dict "root" . "component" "csi-controller") }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.csiController.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.csiController.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: csi-controller
          image: {{ include "simple-zfs-csi.image" (dict "root" . "component" "csiController" "suffix" "controller") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --endpoint=unix://{{ .Values.csiController.socketDir }}/csi.sock
            - --driver-name={{ .Values.driverName }}
            - --create-timeout={{ .Values.csiController.createTimeout }}
            - --poll-interval={{ .Values.csiController.pollInterval }}
            - --pvc-annotation-prefix={{ .Values.csiController.pvcAnnotationPrefix }}
            {{- if .Values.csiController.defaultParameters }}
            - --default-parameters-configmap={{ include "simple-zfs-csi.fullname" . }}-csi-controller-defaults
            {{- end }}
            {{- with (.Values.csiController.logLevel | default .Values.logLevel) }}
            - --zap-log-level={{ . }}
            {{- end }}
            {{- with .Values.csiController.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: socket-dir
              mountPath: {{ .Values.csiController.socketDir }}
          {{- with .Values.csiController.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        - name: csi-provisioner
          image: {{ .Values.csiController.provisioner.image }}:{{ .Values.csiController.provisioner.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --csi-address={{ .Values.csiController.socketDir }}/csi.sock
            - --extra-create-metadata
            {{- with .Values.csiController.provisioner.defaultFsType }}
            # Record a fsType on every filesystem PV (pv.spec.csi.fsType) so
            # kubelet's ReadWriteOnceWithFSType fsGroup policy applies pod fsGroup
            # ownership to the single-node NVMe-oF volumes. NFS (RWX) volumes are
            # inherently skipped by that policy. See csiDriver.fsGroupPolicy.
            - --default-fstype={{ . }}
            {{- end }}
            - --leader-election
            - --leader-election-namespace=$(POD_NAMESPACE)
            {{- with .Values.csiController.provisioner.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: socket-dir
              mountPath: {{ .Values.csiController.socketDir }}
          {{- with .Values.csiController.provisioner.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.csiController.resizer.enabled }}
        - name: csi-resizer
          image: {{ .Values.csiController.resizer.image }}:{{ .Values.csiController.resizer.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --csi-address={{ .Values.csiController.socketDir }}/csi.sock
            - --leader-election
            - --leader-election-namespace=$(POD_NAMESPACE)
            {{- with .Values.csiController.resizer.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: socket-dir
              mountPath: {{ .Values.csiController.socketDir }}
          {{- with .Values.csiController.resizer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- if .Values.csiController.snapshotter.enabled }}
        - name: csi-snapshotter
          image: {{ .Values.csiController.snapshotter.image }}:{{ .Values.csiController.snapshotter.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --csi-address={{ .Values.csiController.socketDir }}/csi.sock
            - --leader-election
            - --leader-election-namespace=$(POD_NAMESPACE)
            {{- with .Values.csiController.snapshotter.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: socket-dir
              mountPath: {{ .Values.csiController.socketDir }}
          {{- with .Values.csiController.snapshotter.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
        - name: csi-attacher
          image: {{ .Values.csiController.attacher.image }}:{{ .Values.csiController.attacher.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --csi-address={{ .Values.csiController.socketDir }}/csi.sock
            - --leader-election
            - --leader-election-namespace=$(POD_NAMESPACE)
            {{- with .Values.csiController.attacher.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: socket-dir
              mountPath: {{ .Values.csiController.socketDir }}
          {{- with .Values.csiController.attacher.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: socket-dir
          emptyDir: {}
{{- end }}
