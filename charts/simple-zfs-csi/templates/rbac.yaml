{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
rules:
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["networkexports"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["networkexports/status"]
    verbs: ["get", "update", "patch"]
{{- if .Values.nfs.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-nfs
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "simple-zfs-csi.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "simple-zfs-csi.serviceAccountName" (dict "root" . "component" "nfs") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.nvmeof.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-nvmeof
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: nvmeof
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "simple-zfs-csi.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "simple-zfs-csi.serviceAccountName" (dict "root" . "component" "nvmeof") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.discovery.enabled }}
---
# Tier 1 discovery: publishes ZfsPool objects and their status from each node.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-discovery
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: discovery
rules:
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfspools"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfspools/status"]
    verbs: ["get", "update", "patch"]
  # ZfsDataset allocation: the agent creates/destroys datasets and zvols for
  # volumes whose pool is currently hosted on this node.
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfsdatasets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfsdatasets/status"]
    verbs: ["get", "update", "patch"]
  # ZfsSnapshot: the agent takes/destroys `dataset@snap` on the hosting node.
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfssnapshots"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfssnapshots/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-discovery
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "simple-zfs-csi.fullname" . }}-discovery
subjects:
  - kind: ServiceAccount
    name: {{ include "simple-zfs-csi.serviceAccountName" (dict "root" . "component" "discovery") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.operator.enabled }}
---
# Operator: cluster-wide control plane. Watches Nodes and offlines dead nodes'
# ZfsPool status; hosts the cluster-scoped reconcilers.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-operator
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfspools"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfspools/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfsshares"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfsshares/status"]
    verbs: ["get", "update", "patch"]
  # Attach-stage access control (ADR-0010): aggregate per-node attach requests
  # into a lazily-managed ZfsShare; read ZfsDataset + Node to build the allow-list.
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfsshareattachrequests"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfsshareattachrequests/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfsdatasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["networkexports"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-operator
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "simple-zfs-csi.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "simple-zfs-csi.serviceAccountName" (dict "root" . "component" "operator") }}
    namespace: {{ .Release.Namespace }}
{{- if .Values.operator.leaderElect }}
---
# Namespaced permissions for the operator's leader-election lease.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-operator-leaderelection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-operator-leaderelection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "simple-zfs-csi.fullname" . }}-operator-leaderelection
subjects:
  - kind: ServiceAccount
    name: {{ include "simple-zfs-csi.serviceAccountName" (dict "root" . "component" "operator") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
{{- if .Values.csiController.enabled }}
---
# CSI controller: writes ZfsDataset/ZfsShare, reads PVCs; the co-located
# external-provisioner sidecar manages PVs/PVCs/StorageClasses/events.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-csi-controller
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-controller
rules:
  # --- driver: ZFS-centric CRDs it authors ---
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfsdatasets", "zfsshares", "zfssnapshots", "zfsshareattachrequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfsdatasets/status", "zfsshares/status", "zfssnapshots/status", "zfsshareattachrequests/status"]
    verbs: ["get"]
  # --- driver: PVC annotations for the parameter inheritance layer ---
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update"]
  # --- external-provisioner sidecar ---
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch", "create", "update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csinodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments/status"]
    verbs: ["patch"]
  # --- external-resizer sidecar ---
  - apiGroups: [""]
    resources: ["persistentvolumeclaims/status"]
    verbs: ["patch", "update"]
  {{- if .Values.csiController.snapshotter.enabled }}
  # --- external-snapshotter sidecar ---
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents/status"]
    verbs: ["update", "patch"]
  # external-provisioner resolves a snapshot/volume dataSource for restore/clone.
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-csi-controller
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "simple-zfs-csi.fullname" . }}-csi-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "simple-zfs-csi.serviceAccountName" (dict "root" . "component" "csi-controller") }}
    namespace: {{ .Release.Namespace }}
---
# Namespaced permissions for external-provisioner leader-election.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-csi-controller-leaderelection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-controller
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-csi-controller-leaderelection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "simple-zfs-csi.fullname" . }}-csi-controller-leaderelection
subjects:
  - kind: ServiceAccount
    name: {{ include "simple-zfs-csi.serviceAccountName" (dict "root" . "component" "csi-controller") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.csiNode.enabled }}
---
# CSI node plugin: read-only access to resolve routing (ZfsPool.status) and the
# NVMe-oF subsystem NQN (NetworkExport.status). It writes no CRDs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-csi-node
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-node
rules:
  - apiGroups: ["storage.simple-zfs-csi.io"]
    resources: ["zfspools", "networkexports"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-csi-node
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-node
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "simple-zfs-csi.fullname" . }}-csi-node
subjects:
  - kind: ServiceAccount
    name: {{ include "simple-zfs-csi.serviceAccountName" (dict "root" . "component" "csi-node") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.operator.enabled }}
---
# Operator: manages per-attach NVMe-oF DH-CHAP Secrets in the release namespace
# (ADR-0011). Namespaced so the operator cannot read secrets cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-operator-dhchap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-operator-dhchap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "simple-zfs-csi.fullname" . }}-operator-dhchap
subjects:
  - kind: ServiceAccount
    name: {{ include "simple-zfs-csi.serviceAccountName" (dict "root" . "component" "operator") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if or .Values.nvmeof.enabled .Values.csiNode.enabled }}
---
# DH-CHAP secret readers: the nvmeof aggregator programs the target's dhchap_key
# and the csi-node passes it to `nvme connect` (ADR-0011). Read-only, namespaced.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-dhchap-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "simple-zfs-csi.fullname" . }}-dhchap-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-zfs-csi.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "simple-zfs-csi.fullname" . }}-dhchap-reader
subjects:
  {{- if .Values.nvmeof.enabled }}
  - kind: ServiceAccount
    name: {{ include "simple-zfs-csi.serviceAccountName" (dict "root" . "component" "nvmeof") }}
    namespace: {{ .Release.Namespace }}
  {{- end }}
  {{- if .Values.csiNode.enabled }}
  - kind: ServiceAccount
    name: {{ include "simple-zfs-csi.serviceAccountName" (dict "root" . "component" "csi-node") }}
    namespace: {{ .Release.Namespace }}
  {{- end }}
{{- end }}
{{- end }}
