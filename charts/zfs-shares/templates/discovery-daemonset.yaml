{{- if .Values.discovery.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "zfs-shares.fullname" . }}-discovery
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: discovery
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zfs-shares.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: discovery
  template:
    metadata:
      labels:
        {{- include "zfs-shares.labels" . | nindent 8 }}
        app.kubernetes.io/component: discovery
      {{- with .Values.discovery.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "zfs-shares.serviceAccountName" (dict "root" . "component" "discovery") }}
      # No hostNetwork: discovery only reads the node IP via the downward API
      # (status.hostIP) and talks to the Kubernetes API; it serves nothing to
      # other nodes. status.hostIP is the node address regardless of hostNetwork.
      {{- if and .Values.discovery.hostExec.enabled (eq .Values.discovery.hostExec.mode "nsenter") }}
      # hostPID lets nsenter reach the target PID's namespaces to run host zpool/zfs.
      hostPID: true
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: zpool-discovery
          image: {{ include "zfs-shares.image" (dict "root" . "component" "discovery") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --node-name=$(NODE_NAME)
            - --node-ip=$(NODE_IP)
            - --poll-interval={{ .Values.discovery.pollInterval }}
            - --zpool-bin={{ .Values.discovery.zpoolBin }}
            - --zfs-bin={{ .Values.discovery.zfsBin }}
            {{- if .Values.discovery.hostExec.enabled }}
            - --host-exec-mode={{ .Values.discovery.hostExec.mode }}
            {{- if eq .Values.discovery.hostExec.mode "chroot" }}
            - --host-root=/host
            {{- else if eq .Values.discovery.hostExec.mode "nsenter" }}
            - --nsenter-target-pid={{ .Values.discovery.hostExec.targetPid }}
            {{- end }}
            {{- end }}
            - --metrics-bind-address=:{{ .Values.discovery.ports.metrics }}
            - --health-probe-bind-address=:{{ .Values.discovery.ports.health }}
            {{- with .Values.discovery.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          securityContext:
            privileged: true
          ports:
            - name: metrics
              containerPort: {{ .Values.discovery.ports.metrics }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.discovery.ports.health }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.discovery.ports.health }}
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.discovery.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: dev
              mountPath: /dev
              mountPropagation: HostToContainer
            {{- if and .Values.discovery.hostExec.enabled (eq .Values.discovery.hostExec.mode "chroot") }}
            - name: host-root
              mountPath: /host
              mountPropagation: HostToContainer
            {{- end }}
      volumes:
        - name: dev
          hostPath:
            path: /dev
            type: Directory
        {{- if and .Values.discovery.hostExec.enabled (eq .Values.discovery.hostExec.mode "chroot") }}
        - name: host-root
          hostPath:
            path: {{ .Values.discovery.hostExec.hostRootPath }}
            type: Directory
        {{- end }}
{{- end }}
