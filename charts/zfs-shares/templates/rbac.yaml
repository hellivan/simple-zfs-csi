{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zfs-shares.fullname" . }}
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
rules:
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["networkexports"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["networkexports/status"]
    verbs: ["get", "update", "patch"]
{{- if .Values.nfs.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zfs-shares.fullname" . }}-nfs
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zfs-shares.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "zfs-shares.serviceAccountName" (dict "root" . "component" "nfs") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.nvmeof.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zfs-shares.fullname" . }}-nvmeof
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: nvmeof
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zfs-shares.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "zfs-shares.serviceAccountName" (dict "root" . "component" "nvmeof") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.discovery.enabled }}
---
# Tier 1 discovery: publishes ZfsPool objects and their status from each node.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zfs-shares.fullname" . }}-discovery
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: discovery
rules:
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["zfspools"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["zfspools/status"]
    verbs: ["get", "update", "patch"]
  # ZfsVolume allocation: the agent creates/destroys datasets and zvols for
  # volumes whose pool is currently hosted on this node.
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["zfsvolumes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["zfsvolumes/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zfs-shares.fullname" . }}-discovery
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zfs-shares.fullname" . }}-discovery
subjects:
  - kind: ServiceAccount
    name: {{ include "zfs-shares.serviceAccountName" (dict "root" . "component" "discovery") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.operator.enabled }}
---
# Operator: cluster-wide control plane. Watches Nodes and offlines dead nodes'
# ZfsPool status; hosts the cluster-scoped reconcilers.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zfs-shares.fullname" . }}-operator
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["zfspools"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["zfspools/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["zfsshares"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["zfsshares/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["networkexports"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zfs-shares.fullname" . }}-operator
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zfs-shares.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "zfs-shares.serviceAccountName" (dict "root" . "component" "operator") }}
    namespace: {{ .Release.Namespace }}
{{- if .Values.operator.leaderElect }}
---
# Namespaced permissions for the operator's leader-election lease.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "zfs-shares.fullname" . }}-operator-leaderelection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "zfs-shares.fullname" . }}-operator-leaderelection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "zfs-shares.fullname" . }}-operator-leaderelection
subjects:
  - kind: ServiceAccount
    name: {{ include "zfs-shares.serviceAccountName" (dict "root" . "component" "operator") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
{{- if .Values.csiController.enabled }}
---
# CSI controller: writes ZfsVolume/ZfsShare, reads PVCs; the co-located
# external-provisioner sidecar manages PVs/PVCs/StorageClasses/events.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zfs-shares.fullname" . }}-csi-controller
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-controller
rules:
  # --- driver: ZFS-centric CRDs it authors ---
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["zfsvolumes", "zfsshares"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["zfsvolumes/status", "zfsshares/status"]
    verbs: ["get"]
  # --- driver: PVC annotations for the parameter inheritance layer ---
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update"]
  # --- external-provisioner sidecar ---
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch", "create", "update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csinodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zfs-shares.fullname" . }}-csi-controller
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zfs-shares.fullname" . }}-csi-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "zfs-shares.serviceAccountName" (dict "root" . "component" "csi-controller") }}
    namespace: {{ .Release.Namespace }}
---
# Namespaced permissions for external-provisioner leader-election.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "zfs-shares.fullname" . }}-csi-controller-leaderelection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-controller
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "zfs-shares.fullname" . }}-csi-controller-leaderelection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "zfs-shares.fullname" . }}-csi-controller-leaderelection
subjects:
  - kind: ServiceAccount
    name: {{ include "zfs-shares.serviceAccountName" (dict "root" . "component" "csi-controller") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.csiNode.enabled }}
---
# CSI node plugin: read-only access to resolve routing (ZfsPool.status) and the
# NVMe-oF subsystem NQN (NetworkExport.status). It writes no CRDs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zfs-shares.fullname" . }}-csi-node
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-node
rules:
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["zfspools", "networkexports"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zfs-shares.fullname" . }}-csi-node
  labels:
    {{- include "zfs-shares.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-node
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zfs-shares.fullname" . }}-csi-node
subjects:
  - kind: ServiceAccount
    name: {{ include "zfs-shares.serviceAccountName" (dict "root" . "component" "csi-node") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
