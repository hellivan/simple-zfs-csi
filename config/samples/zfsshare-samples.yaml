---
# Dynamically export a ZFS dataset over NFS (RWX). The dataset must already be
# provisioned/mounted on the node by the storage plane.
apiVersion: storage.zfs-shares.io/v1alpha1
kind: ZfsShare
metadata:
  name: pvc-media-movies
spec:
  nodeName: talos-node-01
  protocol: nfs
  path: /tank/media/movies
  nfs:
    clients:
      - client: "10.0.0.0/24"
        options: ["rw", "sync", "no_subtree_check", "no_root_squash"]
---
# Export a ZFS zvol over NVMe-oF (TCP). The zvol device must already exist.
apiVersion: storage.zfs-shares.io/v1alpha1
kind: ZfsShare
metadata:
  name: pvc-postgres-data
spec:
  nodeName: talos-node-01
  protocol: nvmeof
  path: /dev/zvol/tank/pvc-postgres-data
  nvmeof:
    # nqn omitted -> derived as nqn.2025-01.io.zfs-shares:talos-node-01:pvc-postgres-data
    allowedHosts:
      - "nqn.2014-08.org.nvmexpress:uuid:worker-01"
---
# ZfsPool objects are NOT authored by hand: the Tier 1 discovery DaemonSet
# creates one per imported pool (name = "zpool-<GUID>") and continuously writes
# status. The Tier 2 watcher overrides status.health with NODE_OFFLINE when the
# owning node dies. This is only an illustration of the resulting object.
apiVersion: storage.zfs-shares.io/v1alpha1
kind: ZfsPool
metadata:
  name: zpool-12140134988506841113   # immutable ZFS pool GUID
spec: {}                             # intentionally empty; all data is discovered
# status is managed by the operator:
# status:
#   guid: "12140134988506841113"
#   poolName: tank                   # observed name; may be renamed safely
#   currentNode: talos-node-01
#   currentIP: 192.168.10.15
#   baseMountPath: /tank
#   health: ONLINE
#   lastUpdated: "2026-07-15T10:00:00Z"
