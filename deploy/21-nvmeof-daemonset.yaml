---
# NVMe-oF target DaemonSet. Runs on nodes labelled zfs-shares.io/storage=true
# and programs the kernel NVMe target (nvmet) via configfs for nvmeof shares.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: zfs-shares-nvmeof
  namespace: zfs-shares
  labels:
    app.kubernetes.io/name: zfs-shares
    app.kubernetes.io/component: nvmeof
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: zfs-shares
      app.kubernetes.io/component: nvmeof
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zfs-shares
        app.kubernetes.io/component: nvmeof
    spec:
      serviceAccountName: zfs-shares-nvmeof
      # hostNetwork so initiators reach the NVMe/TCP port (default 4420) on the node IP.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        zfs-shares.io/storage: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: nvmeof-controller
          image: ghcr.io/hellivan/zfs-shares-nvmeof:latest
          imagePullPolicy: IfNotPresent
          args:
            - --node-name=$(NODE_NAME)
            - --transport-service-id=4420
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          ports:
            - name: metrics
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            # nvmet configfs tree (kernel-global). configfs must be mounted on the host.
            - name: configfs
              mountPath: /sys/kernel/config
            # Host device nodes so /dev/zvol/... paths resolve for the kernel.
            - name: dev
              mountPath: /dev
              mountPropagation: HostToContainer
      volumes:
        - name: configfs
          hostPath:
            path: /sys/kernel/config
            type: Directory
        - name: dev
          hostPath:
            path: /dev
            type: Directory
