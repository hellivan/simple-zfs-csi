---
# Shared read/status permissions for both controllers on the cluster-scoped CRD.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zfs-shares-controller
rules:
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["zfsshares"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.zfs-shares.io"]
    resources: ["zfsshares/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zfs-shares-nfs
  namespace: zfs-shares
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zfs-shares-nvmeof
  namespace: zfs-shares
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zfs-shares-nfs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: zfs-shares-controller
subjects:
  - kind: ServiceAccount
    name: zfs-shares-nfs
    namespace: zfs-shares
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zfs-shares-nvmeof
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: zfs-shares-controller
subjects:
  - kind: ServiceAccount
    name: zfs-shares-nvmeof
    namespace: zfs-shares
